                                  "            e.preventDefault(); e.stopPropagation();" +
                                  "            AndroidApp.showProgress('Preparing Download...');" +
                                  "            var xhr = new XMLHttpRequest(); xhr.open('GET', el.href, true); xhr.responseType = 'blob';" +
