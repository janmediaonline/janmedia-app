                          view.evaluateJavascript(masterJs, null);
                      }

                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          if (url.startsWith("http://") || url.startsWith("https://")) { return false; }
                          
                          if (url.startsWith("intent://")) {
                              try {
                                  Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                                  if (intent != null) {
                                      if (getPackageManager().resolveActivity(intent, 0) == null) {
                                          String fallbackUrl = intent.getStringExtra("browser_fallback_url");
                                          if (fallbackUrl != null) { view.loadUrl(fallbackUrl); return true; }
                                      }
                                      startActivity(intent);
                                      return true;
                                  }
                              } catch (Exception e) { return true; }
                          } else if (url.startsWith("upi://") || url.startsWith("paytmmp://") || url.startsWith("tez://") || url.startsWith("phonepe://")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(getApplicationContext(), "App not installed", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }
                          return true;
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      // ALLOW AUDIO PERMISSIONS
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          request.grant(request.getResources());
                      }

                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, FileChooserParams fileChooserParams) {
                          if (mFilePathCallback != null) mFilePathCallback.onReceiveValue(null);
                          mFilePathCallback = filePathCallback;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          intent.setType("*/*");
                          intent.putExtra(Intent.EXTRA_MIME_TYPES, new String[]{"image/*", "video/*"});
                          startActivityForResult(Intent.createChooser(intent, "Select File"), FILECHOOSER_RESULTCODE);
                          return true;
                      }
                  });

                  if (!isNetworkAvailable()) {
                      showOfflinePage(webView);
                  } else {
                      webView.loadUrl("https://janmediaonline.blogspot.com/?m=1");
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent intent) {
                  if (requestCode == FILECHOOSER_RESULTCODE) {
                      if (mFilePathCallback == null) return;
                      Uri[] result = intent == null || resultCode != RESULT_OK ? null : new Uri[]{intent.getData()};
                      mFilePathCallback.onReceiveValue(result);
                      mFilePathCallback = null;
                  }
              }

              public class WebAppInterface {
                  Context mContext;
                  private FileOutputStream fos;
                  private File currentFile;
                  private String currentFileName;
                  private String currentMimeType;
                  private boolean currentIsShare;

                  WebAppInterface(Context c) { mContext = c; }
                  
                  @JavascriptInterface
                  public void showToast(String message) {
                      ((Activity) mContext).runOnUiThread(() -> Toast.makeText(mContext, message, Toast.LENGTH_SHORT).show());
                  }
                  
                  @JavascriptInterface
                  public void showProgress(final String text) {
                      ((Activity) mContext).runOnUiThread(() -> {
                          if(progressDialog == null) initProgressDialog();
                          progressText.setText(text);
                          if(!progressDialog.isShowing()) progressDialog.show();
                      });
                  }
                  
                  @JavascriptInterface
                  public void updateProgress(final int percent) {
                      ((Activity) mContext).runOnUiThread(() -> {
                          if(progressDialog != null && progressDialog.isShowing()) {
                              progressText.setText("Processing Video: " + percent + "%");
                          }
                      });
                  }
                  
                  @JavascriptInterface
                  public void hideProgress() {
                      ((Activity) mContext).runOnUiThread(() -> {
                          if(progressDialog != null && progressDialog.isShowing()) {
                              progressDialog.dismiss();
                          }
                      });
                  }

                  @JavascriptInterface
                  public void shareText(String title, String text, String url) {
                      Intent sendIntent = new Intent();
                      sendIntent.setAction(Intent.ACTION_SEND);
                      String shareStr = text + " " + url;
                      sendIntent.putExtra(Intent.EXTRA_TEXT, shareStr.trim());
                      sendIntent.setType("text/plain");
                      mContext.startActivity(Intent.createChooser(sendIntent, "Share Via"));
                  }

                  // 🔥 CHUNKED TRANSFER FIX (NO HANGS, NO ZIPS, FULL AUDIO) 🔥
                  @JavascriptInterface
                  public void startTransfer(String fileName, String mimeType, boolean isShare) {
                      try {
                          currentFileName = fileName;
                          currentMimeType = mimeType;
                          currentIsShare = isShare;
                          File cachePath = new File(mContext.getCacheDir(), "media");
                          cachePath.mkdirs();
                          currentFile = new File(cachePath, fileName);
                          fos = new FileOutputStream(currentFile);
                      } catch (Exception e) { e.printStackTrace(); }
                  }

                  @JavascriptInterface
                  public void appendChunk(String base64Chunk) {
                      try {
                          byte[] decodedBytes = Base64.decode(base64Chunk, Base64.DEFAULT);
                          if (fos != null) fos.write(decodedBytes);
                      } catch (Exception e) { e.printStackTrace(); }
                  }

                  @JavascriptInterface
                  public void endTransfer() {
                      try {
                          if (fos != null) { fos.flush(); fos.close(); }
                          ((Activity) mContext).runOnUiThread(() -> {
                              if (currentIsShare) { shareSavedFile(); } 
                              else { copyFileToGallery(); }
                          });
                      } catch (Exception e) { e.printStackTrace(); }
                  }
                  
                  private void shareSavedFile() {
                      hideProgress();
                      Uri mediaUri = FileProvider.getUriForFile(mContext, "com.janmedia.app.fileprovider", currentFile);
                      Intent shareIntent = new Intent(Intent.ACTION_SEND);
                      shareIntent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      shareIntent.setDataAndType(mediaUri, currentMimeType);
                      shareIntent.putExtra(Intent.EXTRA_STREAM, mediaUri);
                      mContext.startActivity(Intent.createChooser(shareIntent, "Share Media"));
                  }
                  
                  private void copyFileToGallery() {
                      new Thread(() -> {
                          try {
                              String targetFolder = currentMimeType.contains("video") ? Environment.DIRECTORY_MOVIES : Environment.DIRECTORY_PICTURES;
                              OutputStream outStream;
                              
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                                  ContentValues values = new ContentValues();
                                  values.put(MediaStore.MediaColumns.DISPLAY_NAME, currentFileName);
                                  values.put(MediaStore.MediaColumns.MIME_TYPE, currentMimeType);
                                  values.put(MediaStore.MediaColumns.RELATIVE_PATH, targetFolder);
                                  
                                  Uri collection = currentMimeType.contains("video") ? MediaStore.Video.Media.EXTERNAL_CONTENT_URI : MediaStore.Images.Media.EXTERNAL_CONTENT_URI;
                                  Uri mediaUri = mContext.getContentResolver().insert(collection, values);
                                  outStream = mContext.getContentResolver().openOutputStream(mediaUri);
                              } else {
                                  File mediaDir = Environment.getExternalStoragePublicDirectory(targetFolder);
                                  if (!mediaDir.exists()) mediaDir.mkdirs();
                                  File destFile = new File(mediaDir, currentFileName);
                                  outStream = new FileOutputStream(destFile);
                              }
                              
                              FileInputStream fis = new FileInputStream(currentFile);
                              byte[] buffer = new byte[4096];
                              int length;
                              while ((length = fis.read(buffer)) > 0) {
                                  outStream.write(buffer, 0, length);
                              }
                              fis.close();
                              outStream.close();
                              
                              final String successMsg = currentMimeType.contains("video") ? "✅ Video Saved to Gallery!" : "✅ Poster Saved to Gallery!";
                              ((Activity) mContext).runOnUiThread(() -> {
                                  hideProgress();
                                  Toast.makeText(mContext, successMsg, Toast.LENGTH_LONG).show();
                              });
                          } catch (Exception e) {
                              e.printStackTrace();
                              ((Activity) mContext).runOnUiThread(() -> {
                                  hideProgress();
                                  Toast.makeText(mContext, "❌ Download Failed", Toast.LENGTH_SHORT).show();
                              });
                          }
                      }).start();
                  }
              }
          }
          EOF

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JANMEDIA-APK
          path: app/build/outputs/apk/debug/app-debug.apk
