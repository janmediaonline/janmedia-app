name: Build JANMEDIA APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android App Code
        run: |
          mkdir -p app/src/main/java/com/janmedia/app
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          echo "include ':app'" > settings.gradle
          
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:8.4.2" }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.janmedia.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.janmedia.app"
                  minSdk 22
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.9.0'
          }
          EOF

          # APP ICON
          wget -O app/src/main/res/drawable/app_icon.png "https://i.ibb.co/k2xvqfWG/file-00000000bd8c720b9158f7b8d2b5dd9a.png"

          # FILE PROVIDER
          cat << 'EOF' > app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="shared_media" path="media/"/>
          </paths>
          EOF
          
          # THEME
          cat << 'EOF' > app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/white</item>
                  <item name="android:statusBarColor">#ffffff</item>
                  <item name="android:windowLightStatusBar">true</item>
              </style>
          </resources>
          EOF
          
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <!-- Permissions -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              
              <application android:label="JANMEDIA" android:icon="@drawable/app_icon" android:theme="@style/Theme.App" android:requestLegacyExternalStorage="true" android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|keyboardHidden|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.janmedia.app.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF
          
          cat << 'EOF' > app/src/main/java/com/janmedia/app/MainActivity.java
          package com.janmedia.app;
          
          import android.Manifest;
          import android.app.Activity;
          import android.app.Dialog;
          import android.content.Context;
          import android.content.Intent;
          import android.content.ContentValues;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.util.Base64;
          import android.view.Gravity;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.CookieManager;
          import android.webkit.JavascriptInterface;
          import android.webkit.PermissionRequest;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceError;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.content.FileProvider;
          
          import java.io.File;
          import java.io.FileInputStream;
          import java.io.FileOutputStream;
          import java.io.OutputStream;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private ValueCallback<Uri[]> mFilePathCallback;
              private final static int FILECHOOSER_RESULTCODE = 1;
              private WebAppInterface webAppInterface;
              
              private Dialog progressDialog;
              private TextView progressText;

              private boolean isNetworkAvailable() {
                  ConnectivityManager connectivityManager = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                  if (connectivityManager != null) {
                      NetworkInfo activeNetworkInfo = connectivityManager.getActiveNetworkInfo();
                      return activeNetworkInfo != null && activeNetworkInfo.isConnected();
                  }
                  return false;
              }

              private void showOfflinePage(WebView view) {
                  String customErrorPage = "<html><body style=\"display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif; background-color:#ffffff; color:#002A5C; text-align:center;\"><h2 style=\"font-weight:900; font-size:24px; padding:20px;\">PLEASE CONNECT YOUR INTERNET \uD83D\uDFDC</h2><p style=\"font-size:14px; font-weight:bold; color:#FF5E00; margin-top:30px;\">POWERED BY JANMEDIA</p></body></html>";
                  view.loadDataWithBaseURL(null, customErrorPage, "text/html", "UTF-8", null);
              }
              
              private void initProgressDialog() {
                  progressDialog = new Dialog(this);
                  progressDialog.requestWindowFeature(Window.FEATURE_NO_TITLE);
                  progressDialog.setCancelable(false);
                  
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(80, 80, 80, 80);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.WHITE);
                  
                  ProgressBar progressBar = new ProgressBar(this);
                  layout.addView(progressBar);
                  
                  progressText = new TextView(this);
                  progressText.setText("Preparing...");
                  progressText.setTextColor(Color.parseColor("#002A5C"));
                  progressText.setTextSize(15);
                  progressText.setPadding(0, 40, 0, 0);
                  progressText.setTypeface(null, Typeface.BOLD);
                  layout.addView(progressText);
                  
                  progressDialog.setContentView(layout);
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // 🔥 BLOCK SCREENSHOTS 🔥
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);
                  
                  final WebView webView = new WebView(this);
                  webView.setBackgroundColor(Color.WHITE); 
                  setContentView(webView);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      requestPermissions(new String[]{
                          Manifest.permission.WRITE_EXTERNAL_STORAGE, 
                          Manifest.permission.READ_EXTERNAL_STORAGE,
                          Manifest.permission.READ_MEDIA_IMAGES,
                          Manifest.permission.READ_MEDIA_VIDEO,
                          Manifest.permission.RECORD_AUDIO
                      }, 1);
                  }
                  
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  
                  // 🔥 AUDIO / VIDEO CORS FIXES 🔥
                  webSettings.setAllowFileAccess(true);
                  webSettings.setAllowContentAccess(true);
                  webSettings.setAllowUniversalAccessFromFileURLs(true);
                  webSettings.setAllowFileAccessFromFileURLs(true);
                  webSettings.setMediaPlaybackRequiresUserGesture(false); 
                  webSettings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  
                  String customUserAgent = "Mozilla/5.0 (Linux; Android 12; SM-G991B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36";
                  webSettings.setUserAgentString(customUserAgent);

                  CookieManager.getInstance().setAcceptCookie(true);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);
                  }

                  webAppInterface = new WebAppInterface(this);
                  webView.addJavascriptInterface(webAppInterface, "AndroidApp");

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request, WebResourceError error) {
                          if (request.isForMainFrame()) { showOfflinePage(view); }
                      }

                      @SuppressWarnings("deprecation")
                      @Override
                      public void onReceivedError(WebView view, int errorCode, String description, String failingUrl) {
                          showOfflinePage(view);
                      }

                      @Override
