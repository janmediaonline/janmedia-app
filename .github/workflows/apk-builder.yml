                                  "window.processAndDownloadVideo = async function(videoUrl, actionType, nColor, pColor) {" +
                                  "  if(!user || !user.imageUrl || !user.name) { switchTab('Profile'); return; }" +
                                  "  AndroidApp.showProgress('Connecting Media...');" +
