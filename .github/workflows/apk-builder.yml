                                  "      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, targetH, targetW, footerH);" +
                                  "      ctx.fillStyle = '#002A5C'; ctx.fillRect(0, targetH, targetW, 8);" +
                                  "      if(partyLogoImg.width) { ctx.globalAlpha = 0.1; ctx.drawImage(partyLogoImg, 6, targetH + 6, footerH - 12, footerH - 12); ctx.globalAlpha = 1.0; }" +
