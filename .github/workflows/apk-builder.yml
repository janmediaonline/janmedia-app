name: Build JANMEDIA APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android App Code
        run: |
          mkdir -p app/src/main/java/com/janmedia/app
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          echo "include ':app'" > settings.gradle
          
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:8.4.2" }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.janmedia.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.janmedia.app"
                  minSdk 22
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.9.0'
          }
          EOF

          # APP ICON DOWNLOAD
          wget -O app/src/main/res/drawable/app_icon.png "https://i.ibb.co/k2xvqfWG/file-00000000bd8c720b9158f7b8d2b5dd9a.png"

          # FILE PROVIDER PATHS (Images & Videos kosam)
          cat << 'EOF' > app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="shared_media" path="media/"/>
          </paths>
          EOF
          
          # WHITE THEME TO REMOVE BLACK SCREEN
          cat << 'EOF' > app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/white</item>
                  <item name="android:statusBarColor">#ffffff</item>
                  <item name="android:windowLightStatusBar">true</item>
              </style>
          </resources>
          EOF
          
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              
              <application android:label="JANMEDIA" android:icon="@drawable/app_icon" android:theme="@style/Theme.App" android:requestLegacyExternalStorage="true" android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|keyboardHidden|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.janmedia.app.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF
          
          cat << 'EOF' > app/src/main/java/com/janmedia/app/MainActivity.java
          package com.janmedia.app;
          
          import android.Manifest;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.ContentValues;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.util.Base64;
          import android.webkit.CookieManager;
          import android.webkit.JavascriptInterface;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceError;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.content.FileProvider;
          
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.OutputStream;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private ValueCallback<Uri[]> mFilePathCallback;
              private final static int FILECHOOSER_RESULTCODE = 1;
              private WebAppInterface webAppInterface;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  final WebView webView = new WebView(this);
                  webView.setBackgroundColor(Color.WHITE); 
                  setContentView(webView);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      requestPermissions(new String[]{
                          Manifest.permission.WRITE_EXTERNAL_STORAGE, 
                          Manifest.permission.READ_EXTERNAL_STORAGE,
                          Manifest.permission.READ_MEDIA_IMAGES,
                          Manifest.permission.READ_MEDIA_VIDEO
                      }, 1);
                  }
                  
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setMediaPlaybackRequiresUserGesture(false); // Video autoplay kosam
                  
                  String customUserAgent = "Mozilla/5.0 (Linux; Android 12; SM-G991B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36";
                  webSettings.setUserAgentString(customUserAgent);

                  CookieManager.getInstance().setAcceptCookie(true);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);
                  }

                  webAppInterface = new WebAppInterface(this);
                  webView.addJavascriptInterface(webAppInterface, "AndroidApp");

                  webView.setWebViewClient(new WebViewClient() {
                      // OFFLINE PAGE
                      private void showOfflinePage(WebView view) {
                          String customErrorPage = "<html><body style=\"display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif; background-color:#ffffff; color:#002A5C; text-align:center;\"><h2 style=\"font-weight:900; font-size:24px; padding:20px;\">PLEASE CONNECT YOUR INTERNET \uD83D\uDFDC</h2><p style=\"font-size:14px; font-weight:bold; color:#FF5E00; margin-top:30px;\">POWERED BY JANMEDIA</p></body></html>";
                          view.loadData(customErrorPage, "text/html", "UTF-8");
                      }

                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request, WebResourceError error) {
                          if (request.isForMainFrame()) {
                              showOfflinePage(view);
                          }
                      }

                      @SuppressWarnings("deprecation")
                      @Override
                      public void onReceivedError(WebView view, int errorCode, String description, String failingUrl) {
                          showOfflinePage(view);
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          
                          // DYNAMIC SHARE INJECTOR (Images & Videos ki pani chestundi)
                          String jsShareFix = "javascript:(function() {" +
                                  "Object.defineProperty(navigator, 'canShare', { get: function() { return function() { return true; }; } });" +
                                  "Object.defineProperty(navigator, 'share', { get: function() { return function(data) {" +
                                  "  return new Promise((resolve, reject) => {" +
                                  "    if(data.files && data.files.length > 0) {" +
                                  "        var reader = new FileReader();" +
                                  "        reader.onloadend = function() {" +
                                  "            AndroidApp.shareMedia(reader.result, data.text || '', data.files[0].name || '');" +
                                  "            resolve();" +
                                  "        };" +
                                  "        reader.readAsDataURL(data.files[0]);" +
                                  "    } else {" +
                                  "        AndroidApp.shareText(data.title || '', data.text || '', data.url || '');" +
                                  "        resolve();" +
                                  "    }" +
                                  "  });" +
                                  "}; } });" +
                                  "})();";
                          view.evaluateJavascript(jsShareFix, null);
                          
                          // DYNAMIC DOWNLOAD INJECTOR
                          String jsDownloadFix = "javascript:(function() {" +
                                  "document.addEventListener('click', function(e) {" +
                                  "    var el = e.target.closest('a[download]');" +
                                  "    if(el && el.href && el.href.startsWith('data:')) {" +
                                  "        e.preventDefault();" +
                                  "        e.stopPropagation();" +
                                  "        AndroidApp.downloadMedia(el.href, el.download);" +
                                  "    }" +
                                  "}, true);" +
                                  "})();";
                          view.evaluateJavascript(jsDownloadFix, null);
                      }

                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          if (url.startsWith("http://") || url.startsWith("https://")) { return false; }
                          
                          if (url.startsWith("intent://")) {
                              try {
                                  Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                                  if (intent != null) {
                                      if (getPackageManager().resolveActivity(intent, 0) == null) {
                                          String fallbackUrl = intent.getStringExtra("browser_fallback_url");
                                          if (fallbackUrl != null) { view.loadUrl(fallbackUrl); return true; }
                                      }
                                      startActivity(intent);
                                      return true;
                                  }
                              } catch (Exception e) { return true; }
                          } else if (url.startsWith("upi://") || url.startsWith("paytmmp://") || url.startsWith("tez://") || url.startsWith("phonepe://")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(getApplicationContext(), "App not installed", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }
                          return true;
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, FileChooserParams fileChooserParams) {
                          if (mFilePathCallback != null) mFilePathCallback.onReceiveValue(null);
                          mFilePathCallback = filePathCallback;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          // Ippudu images mariyu videos rendu theesukuntundi (Admin Uploads kosam)
                          intent.setType("*/*");
                          intent.putExtra(Intent.EXTRA_MIME_TYPES, new String[]{"image/*", "video/*"});
                          startActivityForResult(Intent.createChooser(intent, "Select File"), FILECHOOSER_RESULTCODE);
                          return true;
                      }
                  });

                  webView.loadUrl("https://janmediaonline.blogspot.com/?m=1");
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent intent) {
                  if (requestCode == FILECHOOSER_RESULTCODE) {
                      if (mFilePathCallback == null) return;
                      Uri[] result = intent == null || resultCode != RESULT_OK ? null : new Uri[]{intent.getData()};
                      mFilePathCallback.onReceiveValue(result);
                      mFilePathCallback = null;
                  }
              }

              public class WebAppInterface {
                  Context mContext;
                  WebAppInterface(Context c) { mContext = c; }

                  @JavascriptInterface
                  public void shareText(String title, String text, String url) {
                      Intent sendIntent = new Intent();
                      sendIntent.setAction(Intent.ACTION_SEND);
                      String shareStr = text + " " + url;
                      sendIntent.putExtra(Intent.EXTRA_TEXT, shareStr.trim());
                      sendIntent.setType("text/plain");
                      mContext.startActivity(Intent.createChooser(sendIntent, "Share Via"));
                  }

                  // 🔴 SHARE INTERFACE (Handles Images & Videos)
                  @JavascriptInterface
                  public void shareMedia(String base64Data, String text, String fileName) {
                      try {
                          String mimeType = "image/webp";
                          String extension = ".webp";
                          
                          if (base64Data.startsWith("data:")) {
                              mimeType = base64Data.substring(5, base64Data.indexOf(";"));
                          }
                          
                          if (mimeType.contains("mp4")) extension = ".mp4";
                          else if (mimeType.contains("webm")) extension = ".webm";
                          else if (mimeType.contains("png")) extension = ".png";
                          else if (mimeType.contains("jpeg") || mimeType.contains("jpg")) extension = ".jpg";

                          String actualFileName = (fileName != null && !fileName.isEmpty()) ? fileName : ("janmedia_share" + extension);
                          String base64Raw = base64Data.substring(base64Data.indexOf(",") + 1);
                          byte[] decodedBytes = Base64.decode(base64Raw, Base64.DEFAULT);

                          File cachePath = new File(mContext.getCacheDir(), "media");
                          cachePath.mkdirs();
                          File file = new File(cachePath, actualFileName);
                          FileOutputStream fos = new FileOutputStream(file);
                          fos.write(decodedBytes);
                          fos.close();

                          Uri mediaUri = FileProvider.getUriForFile(mContext, "com.janmedia.app.fileprovider", file);
                          
                          Intent shareIntent = new Intent();
                          shareIntent.setAction(Intent.ACTION_SEND);
                          shareIntent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                          shareIntent.setDataAndType(mediaUri, mimeType);
                          shareIntent.putExtra(Intent.EXTRA_STREAM, mediaUri);
                          if(text != null && !text.isEmpty()) {
                              shareIntent.putExtra(Intent.EXTRA_TEXT, text);
                          }
                          mContext.startActivity(Intent.createChooser(shareIntent, "Share"));
                      } catch (Exception e) {
                          ((Activity) mContext).runOnUiThread(() -> Toast.makeText(mContext, "Share failed", Toast.LENGTH_SHORT).show());
                      }
                  }

                  // 🔴 DOWNLOAD INTERFACE (Handles Images & Videos to correct folders)
                  @JavascriptInterface
                  public void downloadMedia(String base64Data, String fileName) {
                      try {
                          String mimeType = "image/webp";
                          String extension = ".webp";
                          String targetFolder = Environment.DIRECTORY_PICTURES;
                          
                          if (base64Data.startsWith("data:")) {
                              mimeType = base64Data.substring(5, base64Data.indexOf(";"));
                          }

                          if (mimeType.contains("video")) {
                              targetFolder = Environment.DIRECTORY_MOVIES;
                              if (mimeType.contains("mp4")) extension = ".mp4";
                              else if (mimeType.contains("webm")) extension = ".webm";
                          } else {
                              if (mimeType.contains("png")) extension = ".png";
                              else if (mimeType.contains("jpeg") || mimeType.contains("jpg")) extension = ".jpg";
                          }
                          
                          if(fileName == null || fileName.isEmpty()) {
                              fileName = "JANMEDIA_" + new SimpleDateFormat("yyyyMMdd_HHmmss", Locale.getDefault()).format(new Date()) + extension;
                          }

                          String base64Raw = base64Data.substring(base64Data.indexOf(",") + 1);
                          byte[] decodedBytes = Base64.decode(base64Raw, Base64.DEFAULT);

                          OutputStream fos;
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                              ContentValues values = new ContentValues();
                              values.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                              values.put(MediaStore.MediaColumns.MIME_TYPE, mimeType);
                              values.put(MediaStore.MediaColumns.RELATIVE_PATH, targetFolder);
                              
                              Uri collection = mimeType.contains("video") ? MediaStore.Video.Media.EXTERNAL_CONTENT_URI : MediaStore.Images.Media.EXTERNAL_CONTENT_URI;
                              Uri mediaUri = mContext.getContentResolver().insert(collection, values);
                              fos = mContext.getContentResolver().openOutputStream(mediaUri);
                          } else {
                              File mediaDir = Environment.getExternalStoragePublicDirectory(targetFolder);
                              if (!mediaDir.exists()) mediaDir.mkdirs();
                              File mediaFile = new File(mediaDir, fileName);
                              fos = new FileOutputStream(mediaFile);
                          }
                          fos.write(decodedBytes);
                          fos.close();
                          
                          final String successMsg = mimeType.contains("video") ? "Video Saved to Gallery!" : "Poster Saved to Gallery!";
                          ((Activity) mContext).runOnUiThread(() -> Toast.makeText(mContext, successMsg, Toast.LENGTH_LONG).show());
                      } catch (Exception e) {
                          ((Activity) mContext).runOnUiThread(() -> Toast.makeText(mContext, "Download Failed", Toast.LENGTH_SHORT).show());
                      }
                  }
              }
          }
          EOF

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JANMEDIA-APK
          path: app/build/outputs/apk/debug/app-debug.apk
