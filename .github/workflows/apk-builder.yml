                                  "    if(el && el.href) {" +
                                  "        if(el.href.startsWith('data:')) {" +
                                  "            e.preventDefault(); e.stopPropagation();" +
                                  "            AndroidApp.showProgress('Saving Poster...');" +
                                  "            window.sendToAndroid(el.href, el.download, false);" +
