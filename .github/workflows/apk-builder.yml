                                  "      ctx.fillStyle = nColor; ctx.textAlign = 'left'; ctx.fillText(user.name, textStartX, targetH + 76);" +
                                  "      if(cycleLogoImg.width) { let nameW = ctx.measureText(user.name).width; ctx.drawImage(cycleLogoImg, textStartX + nameW + 10, targetH + 33, 46, 46); }" +
                                  "      let posFontSize = 30; ctx.font = 'bold ' + posFontSize + 'px ' + fontName;" +
                                  "      while(ctx.measureText(user.position || '').width > maxTextW && posFontSize > 14) { posFontSize -= 2; ctx.font = 'bold ' + posFontSize + 'px ' + fontName; }" +
                                  "      ctx.fillStyle = pColor; ctx.fillText(user.position || '', textStartX, targetH + 130);" +
                                  "      requestAnimationFrame(drawFrame);" +
